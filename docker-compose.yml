services:

  # ── Gradio desktop-style UI (port 7860) ──────────────────────────
  aura-inspector-gradio:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      - SF_INSTANCE_URL=${SF_INSTANCE_URL:-}
      - SF_CLIENT_ID=${SF_CLIENT_ID:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    volumes:
      - ./results:/tmp/aura_results
    restart: unless-stopped

  # ── Web application with DB, auth, and dashboards (port 8080) ────
  aura-inspector-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - WEB_PORT=8080
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    volumes:
      - aura_data:/app/data
    restart: unless-stopped

  # ── MCP server — SSE transport (port 8765) ───────────────────────
  # For stdio/pipe use (Claude Desktop, VS Code), run the container
  # directly: docker run --rm -i aura-inspector-mcp
  # For network-accessible SSE deployment, use this service.
  aura-inspector-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8765:8765"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    restart: unless-stopped

volumes:
  aura_data:
